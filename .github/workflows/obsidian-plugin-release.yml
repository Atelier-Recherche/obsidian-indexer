name: Obsidian plugin release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - name: Install plugin dependencies
        working-directory: plugin
        run: npm ci

      - name: Build plugin
        working-directory: plugin
        run: npm run build

      - name: Verify artefacts
        run: |
          test -f plugin/main.js
          test -f plugin/manifest.json
          test -f plugin/styles.css
          test -f plugin/versions.json
          test -f vault-index-search-release-notes.md

      - name: Create GitHub release (latest)
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: false
          body_path: vault-index-search-release-notes.md
          files: |
            plugin/main.js
            plugin/manifest.json
            plugin/styles.css
            plugin/versions.json
